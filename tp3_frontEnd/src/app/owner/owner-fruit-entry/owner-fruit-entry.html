<div class="card">
    <div class="fruitInfo">
        <h2>{{fruitEntry().fruitName}}</h2>
        <p>quantity : {{fruitEntry().quantity}}</p>
        <p>price : {{fruitEntry().price}} $</p>
    </div>


    <div class="interactions">
        <button class="primaryButton" (click)="this.modify()">Modify</button>
        <button class="secondaryButton" (click)="this.delete()">Delete</button>

    </div>

</div>
